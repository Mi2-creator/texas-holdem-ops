# =============================================================================
# Texas Hold'em Server - Docker Compose Production Configuration
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — primary datastore for wallet, ledger, topup orders, audit logs
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: texas-holdem-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${DB_USER:-texasholdem}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-texasholdem}

    ports:
      - "${DB_PORT:-5432}:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-texasholdem} -d ${DB_NAME:-texasholdem}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - texas-holdem-net

  # ---------------------------------------------------------------------------
  # App — Go backend server
  # ---------------------------------------------------------------------------
  app:
    build:
      context: ${SERVER_SRC:-../../texas-holdem-client}
      dockerfile: ../texas-holdem-ops/docker/Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    image: texas-holdem-server:${VERSION:-latest}
    container_name: texas-holdem-server
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      - HTTP_ADDR=${HTTP_ADDR:-:8080}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - STORAGE_MODE=${STORAGE_MODE:-file}
      - DATA_DIR=/data
      - SHUTDOWN_TIMEOUT=${SHUTDOWN_TIMEOUT:-30}
      - SOFT_LAUNCH=${SOFT_LAUNCH:-false}
      - READ_ONLY=${READ_ONLY:-false}
      - SHUTDOWN=${SHUTDOWN:-false}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - RATE_LIMIT_RPS=${RATE_LIMIT_RPS:-10.0}
      - RATE_LIMIT_BURST=${RATE_LIMIT_BURST:-20}
      # PostgreSQL connection
      - DB_DRIVER=${DB_DRIVER:-postgres}
      - DB_DSN=postgres://${DB_USER:-texasholdem}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-texasholdem}?sslmode=${DB_SSLMODE:-disable}
      # CORS (comma-separated origins allowed for cross-origin requests)
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      # Admin
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}

    ports:
      - "${HOST_PORT:-8080}:8080"

    volumes:
      - ../data:/data
      - ../backups:/backups

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 64M

    security_opt:
      - no-new-privileges:true

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

    networks:
      - texas-holdem-net

# Named volumes
volumes:
  pgdata:
    # If migrating from an older project name, set PGDATA_VOLUME_NAME to the old volume
    # e.g. PGDATA_VOLUME_NAME=docker_pgdata
    name: ${PGDATA_VOLUME_NAME:-}

# Network
networks:
  texas-holdem-net:
    driver: bridge
