# =============================================================================
# Weekly Cloudflare CIDR refresh.
#
# Pulls https://www.cloudflare.com/ips-v4 + /ips-v6 every Monday
# morning UTC. If the normalized list differs from config/cf_cidrs.txt,
# commits the new file on a branch and opens a PR for human review.
# The PR description links to the CF feed so a reviewer can eyeball
# the diff.
#
# Failure modes:
#   - Feed fetch fails     → script exit 2 → job fails → ops gets alerted
#     via the standard GH Action failure channel.
#   - Feed fetch succeeds,
#     list unchanged       → script exit 0 → job passes, no PR.
#   - Feed fetch succeeds,
#     list changed         → script exit 1 → we treat that as success
#     with a diff and open the PR.
#
# Workflow is idempotent: if a prior PR branch (cf-cidrs/YYYY-MM-DD) is
# already open from an earlier run this week, we update it in place
# rather than spawning duplicates.
# =============================================================================
name: cf-cidrs-refresh

# Quoted "on" — unquoted, YAML 1.1 parsers treat it as boolean True,
# which breaks offline validation tools. GitHub Actions accepts either.
"on":
  schedule:
    # Mondays 06:00 UTC. CF rarely publishes more than once a year so
    # weekly is plenty; the cost of checking more often is zero but
    # the noise floor of weekly-scheduled workflow runs is already
    # visible and easy to ignore when there's no PR.
    - cron: '0 6 * * 1'
  workflow_dispatch: # Allow manual trigger from the Actions tab.

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ops repo
        uses: actions/checkout@v4

      - name: Refresh CF CIDR list
        id: refresh
        run: |
          set +e
          ./scripts/refresh_cf_cidrs.sh
          rc=$?
          set -e
          echo "refresh_rc=$rc" >> "$GITHUB_OUTPUT"
          case "$rc" in
            0) echo "No drift — list is current. Nothing to do." ;;
            1) echo "Drift detected — config/cf_cidrs.txt rewritten." ;;
            *) echo "Refresh failed with rc=$rc — failing the job." ; exit $rc ;;
          esac

      - name: Exit if no drift
        if: steps.refresh.outputs.refresh_rc == '0'
        run: exit 0

      - name: Configure git identity
        if: steps.refresh.outputs.refresh_rc == '1'
        run: |
          git config user.name "cf-cidrs-refresh-bot"
          git config user.email "ops+cf-cidrs-bot@users.noreply.github.com"

      - name: Commit + push branch
        if: steps.refresh.outputs.refresh_rc == '1'
        id: commit
        run: |
          DATE_TAG="$(date -u +%Y-%m-%d)"
          BRANCH="cf-cidrs/refresh-${DATE_TAG}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

          git checkout -B "$BRANCH"
          git add config/cf_cidrs.txt

          # Summarize the diff in the commit body so the PR stays readable.
          SUMMARY="$(git diff --cached --stat config/cf_cidrs.txt)"

          git commit -m "cf-cidrs: refresh from upstream ($DATE_TAG)" \
                     -m "$SUMMARY" \
                     -m "Auto-generated by .github/workflows/cf-cidrs-refresh.yml"

          git push --force-with-lease origin "$BRANCH"

      - name: Write PR body
        if: steps.refresh.outputs.refresh_rc == '1'
        run: |
          cat > /tmp/cf_pr_body.md <<'EOF'
          ## Summary
          - Automated refresh of `config/cf_cidrs.txt` from the two Cloudflare
            published feeds:
            - https://www.cloudflare.com/ips-v4
            - https://www.cloudflare.com/ips-v6

          ## Why this matters
          `extractIP()` on the server (client/server/go/api/risk_hooks.go) only
          trusts a `CF-Connecting-IP` header when the TCP peer falls in one of
          these CIDRs — our defense against forged CF headers from direct-origin
          attackers. A stale list means new CF edge IPs start getting dropped
          and the XFF fallback kicks in, degrading IP accuracy for risk
          signals (no outage, but false-positive `same_ip_multi_account` creep).

          ## Test plan
          - [ ] Review the diff of `config/cf_cidrs.txt` (only adds/removes expected).
          - [ ] Merge. Next `./scripts/deploy_backend_safe.sh` will regenerate
                `client/server/go/api/cloudflare_cidr.go` and rsync to prod.
          - [ ] Post-deploy, confirm `go test ./api/...` still passes
                (the sync step runs gofmt; generator is idempotent).

          🤖 Generated by `.github/workflows/cf-cidrs-refresh.yml`
          EOF
          # The heredoc was indented so YAML's literal-block indentation stays
          # valid; strip the leading 10 spaces we added for that reason so the
          # PR body renders as plain Markdown.
          sed -i 's/^          //' /tmp/cf_pr_body.md

      - name: Open PR
        if: steps.refresh.outputs.refresh_rc == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.commit.outputs.branch }}"

          # Skip if a PR from this branch already exists.
          EXISTING="$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' || true)"
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already open for $BRANCH; force-push refreshed its contents."
            exit 0
          fi

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "cf-cidrs: refresh Cloudflare edge ranges ($(date -u +%Y-%m-%d))" \
            --body-file /tmp/cf_pr_body.md
